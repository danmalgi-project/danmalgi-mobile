syntax = "proto3";

package pb;

option go_package = "github.com/danmalgi-project/danmalgi-proto-build/pb";

import "google/protobuf/empty.proto";
import "user.proto";

// FriendService provides services for managing user's friends.
service FriendService {
    // GetFriendList retrieves the user's friend list.
    rpc GetFriendList(google.protobuf.Empty) returns(GetFriendListResponse);
    // UpdateFriendStatus changes the status of a friend (e.g., block, unfriend).
    rpc UpdateFriendStatus(UpdateFriendStatusRequest) returns(UpdateFriendStatusResponse);
}


// Request, Resposne Messages
// GetFriendList
message GetFriendListResponse {
    repeated Friend friends = 1;
}

// UpdateFriendStatus
message UpdateFriendStatusRequest {
    int64        friendship_id = 1;
    FriendStatus friend_status = 2; // 변경할 상태 값
}

message UpdateFriendStatusResponse {
    repeated Friend friends = 1;
}


// Resource Messages
message Friend {
    int64        id     = 1;
    User         user   = 2;
    FriendStatus status = 3;
}


// Enum
enum FriendStatus {
    friend_accept = 0; // 수락
    friend_block  = 1; // 차단
    friend_delete = 2; // 삭제
}