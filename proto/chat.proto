syntax = "proto3";

package pb;

option go_package = "github.com/danmalgi-project/danmalgi-proto-build/pb";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "user.proto";

// ChatService provides services for real-time chat functionalities.
service ChatService {
    // GetPreviousMessages retrieves previous messages in a channel.
    rpc GetPreviousMessages(GetPreviousMessagesRequest) returns(GetPreviousMessagesResponse);
    // ModifyMessage modifies an existing message.
    rpc ModifyMessage(ModifyMessageRequest) returns(google.protobuf.Empty);
    // DeleteMessage deletes a message.
    rpc DeleteMessage(DeleteMessageRequest) returns(google.protobuf.Empty);
    // SendMessage sends a message to the current chat room.
    rpc SendMessage(SendMessageRequest) returns(google.protobuf.Empty);
    // ReceiveMessage establishes a stream to receive messages from the current chat room.
    rpc ReceiveMessage(ReceiveMessageRequest) returns(stream ReceiveMessageResponse);
    // 
    rpc SendHeartBeat(SendHeartBeatRequest) returns(google.protobuf.Empty);
}

// GetPreviousMessages
message GetPreviousMessagesRequest {
    int64          channel_id = 1;
    int32          limit      = 2;
    optional int64 message_id = 3;
}

message GetPreviousMessagesResponse {
    repeated Message messages = 1;
}

// ModifyMessage
message ModifyMessageRequest {
    int64  channel_id = 1;
    int64  message_id = 2;
    string content    = 3;
}

// DeleteMessage
message DeleteMessageRequest {
    int64 channel_id = 1;
    int64 message_id = 2;
}

// SendMessage
message SendMessageRequest {
    int64  channel_id = 1;
    string content    = 2;
    bytes  file       = 3;
}

// ReceiveMessage
message ReceiveMessageRequest {
    int64 channel_id = 1;
}

message ReceiveMessageResponse {
    Message       message = 1;
    MessageStatus status  = 2;
}

// SendHeartBeat
message SendHeartBeatRequest {
    int64 channel_id = 1;
}

// model
message Message {
    int64                     channel_id = 1;
    string                    content    = 2;
    string                    file       = 3;
    User                      user       = 4;
    google.protobuf.Timestamp created_at = 5;
    google.protobuf.Timestamp updated_at = 6;
    int64                     id         = 7;
    bool                      is_author  = 8;
}

enum MessageStatus {
    NONE     = 0;
    MODIFIED = 1;
    DELETED  = 2;
}