syntax = "proto3";

package internalpb;

option go_package = "github.com/danmalgi-project/danmalgi-proto-build/internalpb";

import "option.proto";

service InternalChatService {
    rpc GetChannelDevices(GetChannelDevicesRequest) returns(GetChannelDevicesResponse) {
        option (pb.non_require_auth) = true;
    };

    rpc GetDevices(GetDevicesRequest) returns(GetDevicesResponse) {
        option (pb.non_require_auth) = true;
    };

    rpc GetChannelNames(GetChannelNamesRequest) returns(GetChannelNamesResponse) {
        option (pb.non_require_auth) = true;
    }
}

message GetDevicesRequest {
    repeated string device_ids = 1;
}

message GetDevicesResponse {
    repeated Device devices = 1;   
}

message GetChannelDevicesRequest {
    int64 channel_id = 1;
}

message GetChannelDevicesResponse {
    repeated Device devices = 1;
}

message GetChannelNamesRequest {
    int64          channel_id = 1;
    repeated int64 user_ids   = 2;
}

message GetChannelNamesResponse {
    repeated ChannelName channel_names = 1;
}

message Device {
    int64  user_id   = 1;
    string device_id = 2;
    string fcm_token = 3;
}

message ChannelName {
    int64  user_id      = 1;
    string channel_name = 2; 
}