syntax = "proto3";

option go_package = "github.com/danmalgi-project/danmalgi-proto-build/pb";

package pb;

import "google/protobuf/empty.proto";
import "user.proto";

// DirectMessageService provides services for managing direct message channels.
service DirectMessageService {
    // GetDirectMessageChannelList retrieves the list of direct message channels for the user.
    rpc GetDirectMessageChannelList(google.protobuf.Empty) returns(GetDirectMessageChannelListResponse);
    // CreateDirectMessageChannel creates a new direct message channel with specified friends.
    rpc CreateDirectMessageChannel(CreateDirectMessageChannelRequest) returns(CreateDirectMessageChannelResponse);
}

// GetDirectMessageList
message GetDirectMessageChannelListResponse {
    repeated DirectMessageChannel direct_message_channels = 1;
}

// CreateDirectMessage
message CreateDirectMessageChannelRequest {
    repeated int64 friend_ids = 1; // 친구 아이디 
}

message CreateDirectMessageChannelResponse {
    DirectMessageChannel direct_message_channel = 1; // 생성된 dm
}

// model
message DirectMessageChannel {
    int64         dm_id        = 1;
    repeated User users        = 2; // 불필요???
    string        channel_name = 3;
}